name: analyze

on:
  schedule:
    - cron: "41 14 * * *"
  workflow_dispatch:

concurrency:
  group: threads-ai-agent-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    if: vars.BOT_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e .[dev]
      - run: threads-agent analyze
      - name: Commit analysis logs
        run: |
          git config user.name "threads-ai-agent"
          git config user.email "actions@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "chore: write daily threads report"
          git push
