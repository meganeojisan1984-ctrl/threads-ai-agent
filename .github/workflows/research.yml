name: research

on:
  schedule:
    - cron: "17 22 * * *"
  workflow_dispatch:

concurrency:
  group: threads-ai-agent-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    if: vars.BOT_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e .[dev]
      - run: threads-agent research
        env:
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
      - run: threads-agent write
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          POSTS_PER_DAY: ${{ vars.POSTS_PER_DAY }}
      - name: Commit data updates
        run: |
          git config user.name "threads-ai-agent"
          git config user.email "actions@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "chore: refresh threads topics"
          git push
