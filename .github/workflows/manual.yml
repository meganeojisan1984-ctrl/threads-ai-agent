name: manual

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Command to run"
        required: true
        default: "analyze"
        type: choice
        options:
          - research
          - write
          - publish
          - reply
          - analyze

concurrency:
  group: threads-ai-agent-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  manual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e .[dev]
      - run: threads-agent "${{ inputs.command }}"
        env:
          BOT_ENABLED: ${{ vars.BOT_ENABLED }}
          DRY_RUN: ${{ vars.DRY_RUN }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          POSTS_PER_DAY: ${{ vars.POSTS_PER_DAY }}
          REPLIES_PER_DAY: ${{ vars.REPLIES_PER_DAY }}
          PER_RUN_REPLY_LIMIT: ${{ vars.PER_RUN_REPLY_LIMIT }}
      - name: Commit data logs
        run: |
          git config user.name "threads-ai-agent"
          git config user.email "actions@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "chore: run manual threads agent command"
          git push
