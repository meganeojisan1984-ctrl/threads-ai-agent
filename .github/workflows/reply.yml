name: reply

on:
  schedule:
    # 08:37 JST - reply check after the morning post.
    - cron: "37 23 * * *"
    # 12:37 JST - reply check after the lunch post.
    - cron: "37 3 * * *"
    # 20:37 JST - reply check after the evening post.
    - cron: "37 11 * * *"
    # 22:37 JST - final daily reply check.
    - cron: "37 13 * * *"
  workflow_dispatch:

concurrency:
  group: threads-ai-agent-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  reply:
    runs-on: ubuntu-latest
    if: vars.BOT_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e .[dev]
      - run: threads-agent reply
        env:
          BOT_ENABLED: ${{ vars.BOT_ENABLED }}
          DRY_RUN: ${{ vars.DRY_RUN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          REPLIES_PER_DAY: ${{ vars.REPLIES_PER_DAY }}
          PER_RUN_REPLY_LIMIT: ${{ vars.PER_RUN_REPLY_LIMIT }}
      - name: Commit reply logs
        run: |
          git config user.name "threads-ai-agent"
          git config user.email "actions@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "chore: update reply logs"
          git push
