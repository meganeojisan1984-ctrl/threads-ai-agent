name: publish

on:
  schedule:
    # 08:07 JST - publish before the workday starts.
    - cron: "07 23 * * *"
    # 12:07 JST - publish during the lunch break.
    - cron: "07 3 * * *"
    # 20:07 JST - publish the evening queued post.
    - cron: "07 11 * * *"
  workflow_dispatch:

concurrency:
  group: threads-ai-agent-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: vars.BOT_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e .[dev]
      - run: threads-agent publish
        env:
          BOT_ENABLED: ${{ vars.BOT_ENABLED }}
          DRY_RUN: ${{ vars.DRY_RUN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      - name: Commit publish logs
        run: |
          git config user.name "threads-ai-agent"
          git config user.email "actions@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "chore: update publish logs"
          git push
